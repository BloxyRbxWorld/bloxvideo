<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم الفيديوهات</title>
    <style>
        :root { --primary: #2c3e50; --success: #27ae60; --danger: #e74c3c; --warning: #f1c40f; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; margin: 20px; }
        h1 { color: var(--primary); text-align: center; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 30px; }
        .card { background: white; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); padding: 15px; border-top: 5px solid #ccc; }
        .card.approved { border-top-color: var(--success); }
        .card.pending { border-top-color: var(--warning); }
        
        .thumbnail { width: 100%; height: 180px; object-fit: cover; border-radius: 5px; cursor: pointer; }
        .actions { display: flex; justify-content: space-between; margin-top: 15px; }
        
        button { border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; color: white; transition: 0.3s; }
        .btn-approve { background: var(--success); }
        .btn-delete { background: var(--danger); }
        .btn-clean { background: #8e44ad; margin: 10px auto; display: block; } /* زر التنظيف */
        
        button:hover { opacity: 0.8; }
        .status-badge { font-size: 0.8em; padding: 2px 8px; border-radius: 10px; background: #eee; }

        /* تصميم قسم الدخول */
        #loginSection { max-width: 400px; margin: 100px auto; text-align: center; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        input[type="password"] { width: 90%; padding: 10px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 4px; text-align: center; }
        
        .admin-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
    </style>
</head>
<body>

    <div id="loginSection">
        <h2>دخول المسؤول</h2>
        <input type="password" id="passInput" placeholder="أدخل كلمة المرور">
        <button onclick="checkPass()" style="background: var(--primary); width: 100%; padding: 10px;">دخول</button>
        <p id="errorMsg" style="color: red; display: none; margin-top: 10px;">كلمة المرور خاطئة!</p>
    </div>

    <div id="adminPanel" style="display: none;">
        <div class="admin-header">
            <h1>مدير محتوى فيديوهات التطبيق</h1>
            <button onclick="location.reload()" style="background: var(--primary);">خروج</button>
        </div>

        <button class="btn-clean" onclick="removeDuplicates()">✨ تنظيف الفيديوهات المكررة</button>

        <div id="loader" style="text-align: center;">جاري تحميل الفيديوهات...</div>
        <div id="videoGrid" class="grid"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

    <script>
        // 1. إعدادات Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyCepiqRrWCc9shiyx1YDooHaZUTqesK7Ds",
            authDomain: "blox-ad2af.firebaseapp.com",
            projectId: "blox-ad2af",
            storageBucket: "blox-ad2af.firebasestorage.app",
            messagingSenderId: "10729364649",
            appId: "1:10729364649:web:89bdc9c9493af3339b9db8"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // كلمة المرور
        const MY_PASSWORD = "123654789@W"; 

        function checkPass() {
            const input = document.getElementById('passInput').value;
            if (input === MY_PASSWORD) {
                document.getElementById('loginSection').style.display = "none";
                document.getElementById('adminPanel').style.display = "block";
                loadVideos();
            } else {
                document.getElementById('errorMsg').style.display = "block";
            }
        }

        // 2. جلب البيانات
        function loadVideos() {
            const grid = document.getElementById('videoGrid');
            const loader = document.getElementById('loader');
            
            db.collection("Videos").doc("allVideos").onSnapshot((doc) => {
                if (doc.exists) {
                    grid.innerHTML = "";
                    loader.style.display = "none";
                    const data = doc.data();
                    Object.keys(data).forEach((fieldId) => {
                        renderCard(fieldId, data[fieldId], grid);
                    });
                } else {
                    loader.innerHTML = "الوثيقة allVideos غير موجودة!";
                }
            }, (error) => {
                loader.innerHTML = "خطأ في التحميل: " + error.message;
            });
        }

        // 3. بناء واجهة الفيديو
        function renderCard(fieldId, data, container) {
            const videoId = extractYouTubeId(data.videoUrl);
            const thumbUrl = videoId ? `https://img.youtube.com/vi/${videoId}/mqdefault.jpg` : 'https://via.placeholder.com/300x180?text=No+Thumbnail';

            const card = document.createElement('div');
            card.className = `card ${data.status}`;
            card.innerHTML = `
                <img src="${thumbUrl}" class="thumbnail" onclick="window.open('${data.videoUrl}')">
                <p><strong>المنصة:</strong> ${data.platform} <span class="status-badge">${data.status}</span></p>
                <div class="actions">
                    ${data.status === 'pending' ? `<button class="btn-approve" onclick="updateStatus('${fieldId}', 'approved')">موافقة</button>` : `<span></span>`}
                    <button class="btn-delete" onclick="deleteVideo('${fieldId}')">حذف نهائي</button>
                </div>
            `;
            container.appendChild(card);
        }

        // 4. تحديث الحالة
        window.updateStatus = async (fieldId, newStatus) => {
            if(confirm("هل تريد الموافقة؟")) {
                try {
                    const docRef = db.collection("Videos").doc("allVideos");
                    await docRef.update({ [`${fieldId}.status`]: newStatus });
                } catch (e) { alert("خطأ: " + e.message); }
            }
        };

        // 5. الحذف النهائي
        window.deleteVideo = async (fieldId) => {
            if(confirm("هل أنت متأكد من حذف هذا الفيديو؟")) {
                try {
                    const docRef = db.collection("Videos").doc("allVideos");
                    await docRef.update({ [fieldId]: firebase.firestore.FieldValue.delete() });
                } catch (e) { alert("خطأ: " + e.message); }
            }
        };

        // 6. ميثود حذف الفيديوهات المكررة
        async function removeDuplicates() {
            if (!confirm("هل تريد حذف الفيديوهات المكررة بناءً على الرابط (URL)؟ سيبقى فيديو واحد فقط لكل رابط.")) return;

            try {
                const docRef = db.collection("Videos").doc("allVideos");
                const doc = await docRef.get();
                if (!doc.exists) return;

                const data = doc.data();
                const seenUrls = new Set();
                const updates = {};
                let count = 0;

                Object.keys(data).forEach(fieldId => {
                    const url = data[fieldId].videoUrl;
                    if (seenUrls.has(url)) {
                        updates[fieldId] = firebase.firestore.FieldValue.delete();
                        count++;
                    } else {
                        seenUrls.add(url);
                    }
                });

                if (count > 0) {
                    await docRef.update(updates);
                    alert("تم حذف " + count + " فيديوهات مكررة بنجاح!");
                } else {
                    alert("لا يوجد فيديوهات مكررة.");
                }
            } catch (e) {
                alert("خطأ أثناء التنظيف: " + e.message);
            }
        }

        function extractYouTubeId(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=|shorts\/)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        document.getElementById('passInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') checkPass();
        });
    </script>
</body>
</html>
