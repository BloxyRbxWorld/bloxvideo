<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم الفيديوهات</title>
    <style>
        :root { --primary: #2c3e50; --success: #27ae60; --danger: #e74c3c; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; margin: 20px; }
        h1 { color: var(--primary); text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 30px; }
        .card { background: white; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); padding: 15px; border-top: 5px solid #ccc; }
        .card.approved { border-top-color: var(--success); }
        .card.pending { border-top-color: #f1c40f; }
        .thumbnail { width: 100%; height: 180px; object-fit: cover; border-radius: 5px; cursor: pointer; }
        .actions { display: flex; justify-content: space-between; margin-top: 15px; }
        button { border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; color: white; transition: 0.3s; }
        .btn-approve { background: var(--success); }
        .btn-delete { background: var(--danger); }
        .btn-approve:hover, .btn-delete:hover { opacity: 0.8; }
        .status-badge { font-size: 0.8em; padding: 2px 8px; border-radius: 10px; background: #eee; }
    </style>
</head>
<body>

    <h1>مدير محتوى فيديوهات التطبيق</h1>
    <div id="loader" style="text-align: center;">جاري تحميل الفيديوهات...</div>
    <div id="videoGrid" class="grid"></div>

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

    <script>
        // 1. إعدادات Firebase (ضع إعدادات مشروعك هنا)
        const firebaseConfig = {
            apiKey: "AIzaSyCepiqRrWCc9shiyx1YDooHaZUTqesK7Ds",
            authDomain: "blox-ad2af.firebaseapp.com",
            projectId: "blox-ad2af",
            storageBucket: "blox-ad2af.firebasestorage.app",
            messagingSenderId: "10729364649",
            appId: "1:10729364649:web:89bdc9c9493af3339b9db8"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // 2. جلب البيانات من Firestore
        function loadVideos() {
            const grid = document.getElementById('videoGrid');
            const loader = document.getElementById('loader');
            
            // استماع مباشر للتغييرات (Real-time)
            db.collection("videos").orderBy("timestamp", "desc").onSnapshot((snapshot) => {
                grid.innerHTML = "";
                loader.style.display = "none";
                
                snapshot.forEach((doc) => {
                    const video = doc.data();
                    const id = doc.id;
                    renderCard(id, video, grid);
                });
            });
        }

        // 3. بناء واجهة الفيديو
        function renderCard(id, data, container) {
            const videoId = extractYouTubeId(data.videoUrl);
            const thumbUrl = videoId ? `https://img.youtube.com/vi/${videoId}/mqdefault.jpg` : 'https://via.placeholder.com/300x180?text=No+Thumbnail';

            const card = document.createElement('div');
            card.className = `card ${data.status}`;
            card.innerHTML = `
                <img src="${thumbUrl}" class="thumbnail" onclick="window.open('${data.videoUrl}')">
                <p><strong>المنصة:</strong> ${data.platform} <span class="status-badge">${data.status}</span></p>
                <p style="font-size: 0.7em; color: #777; word-break: break-all;">${data.videoUrl}</p>
                <div class="actions">
                    ${data.status === 'pending' ? 
                        `<button class="btn-approve" onclick="updateStatus('${id}', 'approved')">موافقة</button>` : 
                        `<span></span>`}
                    <button class="btn-delete" onclick="deleteVideo('${id}')">حذف نهائي</button>
                </div>
            `;
            container.appendChild(card);
        }

        // 4. وظيفة الموافقة على الفيديو
        window.updateStatus = async (id, newStatus) => {
            if(confirm("هل تريد الموافقة على عرض هذا الفيديو في التطبيق؟")) {
                try {
                    await db.collection("videos").doc(id).update({ status: newStatus });
                } catch (e) { alert("خطأ في التحديث: " + e.message); }
            }
        };

        // 5. وظيفة الحذف النهائي
       window.deleteVideo = async (fieldId) => {
    if(confirm("هل أنت متأكد من حذف هذا الفيديو؟")) {
        try {
            const docRef = db.collection("Videos").doc("allVideos");
            await docRef.update({
                [fieldId]: firebase.firestore.FieldValue.delete()
            });
            alert("تم الحذف بنجاح");
        } catch (e) { alert("خطأ: " + e.message); }
    }
};

        // وظيفة استخراج ID يوتيوب
        function extractYouTubeId(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=|shorts\/)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        // بدء التشغيل
        loadVideos();
    </script>
</body>
</html>
